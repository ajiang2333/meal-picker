name: CI and production deploy

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    name: Build API and H5
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run api:prisma:generate

      - name: Build API
        run: npm run api:build

      - name: Build H5
        run: npm --workspace apps/miniapp run build:h5

  deploy:
    name: Deploy production
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: production
    concurrency:
      group: production-deploy
      cancel-in-progress: false

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build release
        run: |
          npm run api:prisma:generate
          npm run api:build
          npm --workspace apps/miniapp run build:h5

      - name: Create release archive
        run: |
          tar \
            --exclude=.git \
            --exclude=.github \
            --exclude=node_modules \
            --exclude='*/node_modules' \
            --exclude='*.log' \
            --exclude='*.db' \
            --exclude='*.db-*' \
            --exclude='apps/api/.env' \
            --exclude='apps/api/uploads' \
            -czf "/tmp/waimai-picker-${GITHUB_SHA}.tar.gz" .
          du -h "/tmp/waimai-picker-${GITHUB_SHA}.tar.gz"

      - name: Configure SSH
        env:
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_KNOWN_HOSTS: ${{ secrets.SERVER_KNOWN_HOSTS }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SERVER_SSH_KEY" > ~/.ssh/waimai-picker-deploy
          chmod 600 ~/.ssh/waimai-picker-deploy
          printf '%s\n' "$SERVER_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Verify SSH connection
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ vars.SERVER_PORT || '22' }}
        run: |
          ssh -p "$SERVER_PORT" -i ~/.ssh/waimai-picker-deploy \
            -o BatchMode=yes \
            -o ConnectTimeout=15 \
            -o ConnectionAttempts=1 \
            -o StrictHostKeyChecking=yes \
            "${SERVER_USER}@${SERVER_HOST}" \
            "echo 'SSH connection successful'"

      - name: Upload release
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ vars.SERVER_PORT || '22' }}
        run: |
          scp -P "$SERVER_PORT" -i ~/.ssh/waimai-picker-deploy \
            -o BatchMode=yes \
            -o ConnectTimeout=15 \
            -o ConnectionAttempts=1 \
            -o StrictHostKeyChecking=yes \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=3 \
            "/tmp/waimai-picker-${GITHUB_SHA}.tar.gz" \
            "apps/api/deploy/deploy-ubuntu.sh" \
            "${SERVER_USER}@${SERVER_HOST}:/tmp/"

      - name: Deploy and verify
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PORT: ${{ vars.SERVER_PORT || '22' }}
        run: |
          ssh -p "$SERVER_PORT" -i ~/.ssh/waimai-picker-deploy \
            -o BatchMode=yes \
            -o ConnectTimeout=15 \
            -o ConnectionAttempts=1 \
            -o StrictHostKeyChecking=yes \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=3 \
            "${SERVER_USER}@${SERVER_HOST}" \
            "bash /tmp/deploy-ubuntu.sh /tmp/waimai-picker-${GITHUB_SHA}.tar.gz ${GITHUB_SHA}"

